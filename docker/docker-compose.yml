version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://172.10.42.142:8000
    container_name: ai-image-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://172.10.42.142:8000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai-image-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/ai_image_db
      - SECRET_KEY=your-super-secret-key-change-in-production
      - IMAGE_GENERATOR_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-2.0-flash-exp
      - BANANA_API_KEY=${BANANA_API_KEY:-}
      - BANANA_MODEL_KEY=stable-diffusion-v1-5
      - REPLICATE_API_KEY=${REPLICATE_API_KEY:-}
      - IMAGE_STORAGE_PATH=/app/generated_images
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=["http://localhost:3000","http://172.10.42.142:3000"]
    volumes:
      - generated_images:/app/generated_images
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: ai-image-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ai_image_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

volumes:
  postgres_data:
  generated_images:
